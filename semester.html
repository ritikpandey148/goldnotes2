<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Select Semester</title>

<style>
body{
    background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.card{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
</style>
</head>

<body class="p-6">

<!-- 🔙 Back Button -->
<button onclick="goBack()" class="mb-6 bg-gray-200 px-4 py-2 rounded-lg">
⬅ Back
</button>

<h2 class="text-3xl font-bold text-center text-yellow-700 mb-10">
Select Semester
</h2>

<div id="semesterContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
</div>

<script>

// 🔥 Get year from URL
const params = new URLSearchParams(window.location.search);
const year = params.get("year");

const semesterContainer = document.getElementById("semesterContainer");

// 🔥 Define semester mapping
let semesters = [];

if(year == "1"){
    semesters = [1,2];
}
else if(year == "2"){
    semesters = [3,4];
}
else if(year == "3"){
    semesters = [5,6];
}
else if(year == "4"){
    semesters = [7,8];
}

// 🔥 Create semester cards
semesters.forEach(sem => {

    const link = document.createElement("a");

    // ✅ FIXED LINK (year + sem dono pass ho rahe)
    link.href = `subjects.html?year=${year}&sem=${sem}`;

    link.className = "card p-6 text-center hover:scale-105 transition";

    link.innerHTML = `
        <h3 class="text-xl font-semibold mb-2">SEM - ${sem}</h3>
        <p class="text-sm text-gray-500">Ye semester acha jayega! 😊</p>
    `;

    semesterContainer.appendChild(link);

});

// 🔙 Back
function goBack(){
    window.history.back();
}

</script>

</body>
</html>
